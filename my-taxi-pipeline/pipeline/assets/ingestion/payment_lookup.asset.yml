name: ingestion.payment_lookup
type: duckdb.seed
connection: motherduck-prod

parameters:
  path: payment_lookup.csv

columns:
  - name: payment_type_id
    type: integer
    description: "Numeric identifier for the payment type"
    primary_key: true
    checks:
      - name: not_null
      - name: unique
  - name: payment_type_name
    type: string
    description: "Human-readable name of the payment type (e.g. credit_card, cash)"
    checks:
      - name: not_null
